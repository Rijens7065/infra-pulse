name: Agent — Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "agent/**"

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: cloudsentro/agent

jobs:
  build-push:
    name: Build and Push Agent Image
    runs-on: ubuntu-latest

    steps:
      - name: Check Dockerfile exists
        run: |
          if [ ! -f agent/Dockerfile ]; then
            echo "agent/Dockerfile not found — skipping build (Phase 3 not started yet)"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build Docker Image
        run: |
          docker build \
            --file agent/Dockerfile \
            --tag ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
