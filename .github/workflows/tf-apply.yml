name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'apply' to confirm you have reviewed the plan in HCP Cloud"
        required: true
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: Apply (via HCP Cloud)
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'apply'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Confirm Apply Triggered
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            const sha = commits[0].sha.substring(0, 7);
            console.log(`Apply triggered by @${context.actor} for commit ${sha}`);
            console.log('HCP Cloud will execute the actual terraform apply.');
            console.log('Review progress at: https://app.terraform.io/app/cloudsentro/workspaces/infra-pulse');
