name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: terraform-plan
    runs-on: ubuntu-latest

    env:
      TF_API_TOKEN: ${{ secrets.TF_CLOUD_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Terraform Format Check
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Plan
        id: plan
        shell: bash
        # set -o pipefail so the pipe to tee preserves terraform's exit code.
        # Without it, tee always exits 0 and the step reports success even when
        # the HCP Cloud plan fails.
        run: |
          set -o pipefail
          terraform -chdir=infra plan -no-color -input=false 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLength = 65000;
            const output = raw.length > maxLength
              ? raw.substring(0, maxLength) + '\n\n... output truncated'
              : raw;
            const status = '${{ steps.plan.outcome }}' === 'success'
              ? '✅ Plan succeeded'
              : '❌ Plan failed';
            const body = [
              '## Terraform Plan',
              '',
              `**Status:** ${status}`,
              `*Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`,
              '',
              '<details>',
              '<summary>Show plan output</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
